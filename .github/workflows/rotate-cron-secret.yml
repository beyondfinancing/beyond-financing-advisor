name: Rotate CRON_SECRET

# Auto-rotates Vercel env var CRON_SECRET on the 1st of every month.
# Generates a fresh 48-byte URL-safe random secret, PATCHes the Vercel env var,
# then triggers a redeploy of the production deployment so Vercel Cron picks
# up the new value and starts signing cron requests with it.
#
# Required GitHub Actions secrets (must be created by repo admin in
# Settings -> Secrets and variables -> Actions):
#   VERCEL_API_TOKEN   - Vercel personal access token, scope: this team only
#   VERCEL_TEAM_ID     - team_ZarYkMyHxuOuM6HOjcnaAjhH
#   VERCEL_PROJECT_ID  - prj_CaCHk3WBqlTacVg2LlkB7Fa3dNJr
#
# The workflow can also be triggered manually via the Actions tab
# (workflow_dispatch) for emergency rotation.

on:
  schedule:
    # 03:00 UTC on the 1st of every month (Vercel Cron only runs
    # daily-workflow-update Mon-Fri at 14:15 UTC, so this never collides)
    - cron: "0 3 1 * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: rotate-cron-secret
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    environment: production-secrets
    steps:
      - name: Generate new CRON_SECRET
        id: gen
        run: |
          NEW_SECRET="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=' | tr -d '\n')"
          echo "::add-mask::$NEW_SECRET"
          echo "new_secret=$NEW_SECRET" >> "$GITHUB_OUTPUT"

      - name: Look up existing CRON_SECRET env var ID on Vercel
        id: lookup
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          RESP="$(curl -sS -f \
            -H "Authorization: Bearer $VERCEL_API_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?teamId=$VERCEL_TEAM_ID&decrypt=false")"
          ENV_ID="$(echo "$RESP" | jq -r '.envs[] | select(.key=="CRON_SECRET") | .id' | head -n1)"
          if [ -z "$ENV_ID" ] || [ "$ENV_ID" = "null" ]; then
            echo "ERROR: CRON_SECRET not found on project. Aborting." >&2
            exit 1
          fi
          echo "env_id=$ENV_ID" >> "$GITHUB_OUTPUT"

      - name: PATCH new value to Vercel env var
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          ENV_ID: ${{ steps.lookup.outputs.env_id }}
          NEW_SECRET: ${{ steps.gen.outputs.new_secret }}
        run: |
          set -euo pipefail
          curl -sS -f -X PATCH \
            -H "Authorization: Bearer $VERCEL_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env/$ENV_ID?teamId=$VERCEL_TEAM_ID" \
            -d "$(jq -nc --arg v "$NEW_SECRET" '{value:$v, target:["production","preview"], type:"sensitive"}')" \
            > /dev/null
          echo "CRON_SECRET updated on Vercel."

      - name: Trigger production redeploy so Vercel Cron picks up new secret
        env:
          VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          PROD="$(curl -sS -f \
            -H "Authorization: Bearer $VERCEL_API_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_TEAM_ID&target=production&state=READY&limit=1")"
          SHA="$(echo "$PROD" | jq -r '.deployments[0].meta.githubCommitSha')"
          REF="$(echo "$PROD" | jq -r '.deployments[0].meta.githubCommitRef // "main"')"
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "ERROR: could not resolve current production commit SHA." >&2
            exit 1
          fi
          curl -sS -f -X POST \
            -H "Authorization: Bearer $VERCEL_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v13/deployments?teamId=$VERCEL_TEAM_ID&forceNew=1" \
            -d "$(jq -nc --arg sha "$SHA" --arg ref "$REF" --arg pid "$VERCEL_PROJECT_ID" '{name:"beyond-financing-advisor", project:$pid, target:"production", gitSource:{type:"github", repoId:1209566326, ref:$ref, sha:$sha}}')" \
            > /dev/null
          echo "Production redeploy queued from commit $SHA on $REF."

      - name: Summary
        run: |
          echo "## CRON_SECRET rotation complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- New 48-byte URL-safe secret generated and masked" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vercel env var CRON_SECRET PATCHed (production + preview)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Production redeploy queued; Vercel Cron will use new secret on next fire" >> "$GITHUB_STEP_SUMMARY"
